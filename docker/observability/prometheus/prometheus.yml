global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: dev
    project: central-midias-api

scrape_configs:
  - job_name: central-midias-api
    metrics_path: /api/metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - host.docker.internal:4000
        labels:
          service: central-midias-api
